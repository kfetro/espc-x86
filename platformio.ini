; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

; ── ESP32 target (TTGo VGA32) ────────────────────────────────────────────────

[env:esp32dev]
platform = espressif32 @ ^6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.f_flash = 80000000L
board_build.flash_mode = qio

lib_deps =
    h2zero/NimBLE-Arduino @ ^2.4.0
    https://github.com/bitbank2/unzipLIB

lib_ignore =
    BLE
    BluetoothSerial

build_unflags =
    -fexceptions

build_flags =
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -fno-exceptions
    -Os

build_src_filter =
    +<*>
    -<roms/>

build_type = release

; ── Native target (macOS / Linux host) ───────────────────────────────────────
;
; Builds the emulator core on the host for testing without ESP32 hardware.
;
;   pio run  -e native          Build the native binary
;   pio test -e native          Build and run unit tests
;   pio run  -e native -t exec  Run the native binary

[env:native]
platform = platformio/native
test_framework = unity
test_build_src = true

; Extra script adds native/*.cpp (stubs + main) to the build
extra_scripts = pre:native/pio_extra.py

; Include stub headers first so they shadow ESP32 originals
build_flags =
    -std=c++17
    -D NATIVE_BUILD
    -D FABGL_EMULATED
    -D BOARD_HAS_PSRAM
    -I${PROJECT_DIR}/native/stubs
    -I${PROJECT_DIR}/src
    -Wall -Wextra
    -Wno-unused-parameter
    -Wno-missing-field-initializers
    -Wno-sign-compare
    -Wno-unused-variable
    -Wno-unused-but-set-variable
    -O2 -g
    -pthread

; Only compile the emulation core + video adapters + audio + BIOS from src/.
; Hardware drivers (VGA signal gen, PS/2, SPI, I2S, BT, SD) are replaced by
; native_driver_stubs.cpp via the extra_scripts above.
build_src_filter =
    +<core/>
    +<video/video_system.cpp>
    +<video/cga.cpp>
    +<video/ega.cpp>
    +<video/hercules.cpp>
    +<video/tandy.cpp>
    +<audio/adlib.cpp>
    +<audio/adlib_opl2.cpp>
    +<audio/adlib_wavegen.cpp>
    +<drivers/ipc.cpp>
    +<drivers/input/keyboard_layouts.cpp>
    +<drivers/input/codepages.cpp>
    +<bios.cpp>
    +<computer.cpp>
    +<setup.cpp>
    -<roms/>

; Don't try to pull ESP32-only libraries
lib_ignore =
    BLE
    BluetoothSerial
    NimBLE-Arduino
    unzipLIB
