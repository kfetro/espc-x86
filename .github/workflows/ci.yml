name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native-test:
    name: Native build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-native-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-native-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run native tests
        run: pio test -e native

  esp32-build:
    name: ESP32 firmware build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-esp32-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-esp32-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build ESP32 firmware
        run: pio run -e esp32dev

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: espc-x86-esp32dev-${{ github.sha }}
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/bootloader.bin
            .pio/build/esp32dev/partitions.bin
          if-no-files-found: error
